<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halısaha Maç Yönetim Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            padding: 30px;
        }

        .sidebar {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            height: fit-content;
        }

        .sidebar h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .player-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .player-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            color: #333;
        }

        .player-position {
            font-size: 0.8em;
            color: #999;
            margin-top: 3px;
        }

        .btn-remove {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.2s;
        }

        .btn-remove:hover {
            background: #c0392b;
        }

        .field-container {
            flex: 1;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #229954;
        }

        .btn-reset {
            background: #e74c3c;
        }

        .btn-reset:hover {
            background: #c0392b;
        }

        /* Saha Stilleri */
        .formations-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .formation-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .formation-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .formation-label {
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.3em;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .team1 .formation-label {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .team2 .formation-label {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .team-name-field {
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }

        .team1 .team-name-field {
            color: #c0392b;
        }

        .team2 .team-name-field {
            color: #2980b9;
        }

        .pitch {
            background:
                repeating-linear-gradient(
                    to right,
                    #1e8449 0px,
                    #1e8449 20px,
                    #229954 20px,
                    #229954 40px
                );
            padding: 0;
            position: relative;
            aspect-ratio: 5/8;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .field-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .players-field {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 0;
        }

        .formation-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            padding: 0 20px;
        }

        .player-token {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: grab;
        }

        .player-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .team1 .player-number {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .team2 .player-number {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .player-name-field {
            font-size: 0.8em;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            max-width: 70px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team1 .player-name-field {
            color: #c0392b;
        }

        .team2 .player-name-field {
            color: #2980b9;
        }

        .player-token:hover .player-number {
            transform: scale(1.15);
            transition: transform 0.2s;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-box p {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ Halısaha Maç Yönetim Sistemi</h1>
            <p>Oyuncu Havuzu Oluştur ve Takımları Yönet</p>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <h2>Oyuncu Havuzu</h2>

                <div id="message"></div>

                <div class="form-group">
                    <label for="playerName">Oyuncu Adı</label>
                    <input type="text" id="playerName" placeholder="Örn: Ahmet Yılmaz">
                </div>

                <div class="form-group">
                    <label for="playerPosition">Pozisyon</label>
                    <select id="playerPosition">
                        <option value="">-- Seçin --</option>
                        <option value="Kaleci">🧤 Kaleci</option>
                        <option value="Defans">🛡️ Defans</option>
                        <option value="Orta Saha">🔀 Orta Saha</option>
                        <option value="Forvet">⚡ Forvet</option>
                    </select>
                </div>

                <button onclick="addPlayer()">Oyuncu Ekle</button>
                <button onclick="addTestPlayers()" style="background: #f39c12; margin-top: 10px;">Test Verisi (14 Kişi)</button>

                <div class="player-list">
                    <h3 style="color: #333; margin-bottom: 10px; font-size: 1em;">Oyuncular</h3>
                    <div id="playersList"></div>
                </div>
            </div>

            <!-- Field -->
            <div class="field-container">
                <div class="controls">
                    <button class="btn-action" onclick="createTeams()">Takımları Oluştur</button>
                    <button class="btn-action btn-reset" onclick="resetField()">Sıfırla</button>
                </div>

                <div class="formations-container">
                    <!-- Takım 1 -->
                    <div class="formation-box team1">
                        <div class="formation-title">
                            <div class="team-name-field">Takım 1</div>
                            <div class="formation-label" id="team1-formation">-</div>
                        </div>
                        <div class="pitch">
                            <div class="field-lines">
                                <svg viewBox="0 0 100 150" preserveAspectRatio="none">
                                    <!-- Saha sınırı -->
                                    <rect x="2" y="2" width="96" height="146" fill="none" stroke="white" stroke-width="1.5" rx="8" ry="8"/>

                                    <!-- Orta çizgi -->
                                    <line x1="2" y1="75" x2="98" y2="75" stroke="white" stroke-width="1.5"/>

                                    <!-- Orta daire -->
                                    <circle cx="50" cy="75" r="15" fill="none" stroke="white" stroke-width="1.5"/>
                                    <circle cx="50" cy="75" r="1.5" fill="white"/>

                                    <!-- Kaleci alanı (üst) -->
                                    <rect x="25" y="2" width="50" height="25" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Penaltı kutusu (üst) -->
                                    <rect x="35" y="2" width="30" height="15" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Kaleci alanı (alt) -->
                                    <rect x="25" y="123" width="50" height="25" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Penaltı kutusu (alt) -->
                                    <rect x="35" y="133" width="30" height="15" fill="none" stroke="white" stroke-width="1.5"/>

                                </svg>
                            </div>
                            <div class="players-field" id="team1-field"></div>
                        </div>
                    </div>

                    <!-- Takım 2 -->
                    <div class="formation-box team2">
                        <div class="formation-title">
                            <div class="team-name-field">Takım 2</div>
                            <div class="formation-label" id="team2-formation">-</div>
                        </div>
                        <div class="pitch">
                            <div class="field-lines">
                                <svg viewBox="0 0 100 150" preserveAspectRatio="none">
                                    <!-- Saha sınırı -->
                                    <rect x="2" y="2" width="96" height="146" fill="none" stroke="white" stroke-width="1.5" rx="8" ry="8"/>

                                    <!-- Orta çizgi -->
                                    <line x1="2" y1="75" x2="98" y2="75" stroke="white" stroke-width="1.5"/>

                                    <!-- Orta daire -->
                                    <circle cx="50" cy="75" r="15" fill="none" stroke="white" stroke-width="1.5"/>
                                    <circle cx="50" cy="75" r="1.5" fill="white"/>

                                    <!-- Kaleci alanı (üst) -->
                                    <rect x="25" y="2" width="50" height="25" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Penaltı kutusu (üst) -->
                                    <rect x="35" y="2" width="30" height="15" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Kaleci alanı (alt) -->
                                    <rect x="25" y="123" width="50" height="25" fill="none" stroke="white" stroke-width="1.5"/>

                                    <!-- Penaltı kutusu (alt) -->
                                    <rect x="35" y="133" width="30" height="15" fill="none" stroke="white" stroke-width="1.5"/>

                                </svg>
                            </div>
                            <div class="players-field" id="team2-field"></div>
                        </div>
                    </div>
                </div>

                <!-- İstatistikler -->
                <div class="stats">
                    <div class="stat-box">
                        <h3>Toplam Oyuncu</h3>
                        <p id="totalPlayers">0</p>
                    </div>
                    <div class="stat-box">
                        <h3>Oyuncu Havuzunda</h3>
                        <p id="poolPlayers">0</p>
                    </div>
                    <div class="stat-box">
                        <h3>Takım 1</h3>
                        <p id="team1Count">0</p>
                    </div>
                    <div class="stat-box">
                        <h3>Takım 2</h3>
                        <p id="team2Count">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Veri Yönetimi
        let players = [];
        let team1 = [];
        let team2 = [];
        let playerCounter = {};

        // Test Oyuncuları Oluştur
        function addTestPlayers() {
            const testPlayers = [
                { name: 'Eren Kaya', position: 'Kaleci' },
                { name: 'Ahmet Yılmaz', position: 'Defans' },
                { name: 'Murat Şahin', position: 'Defans' },
                { name: 'Halil Demir', position: 'Orta Saha' },
                { name: 'Samet Arslan', position: 'Orta Saha' },
                { name: 'Ülkü Çetin', position: 'Orta Saha' },
                { name: 'Mert Kılıç', position: 'Forvet' },
                { name: 'Berk Gül', position: 'Kaleci' },
                { name: 'Ufuk Soylu', position: 'Defans' },
                { name: 'Serkan Aydın', position: 'Defans' },
                { name: 'Kerem Şen', position: 'Orta Saha' },
                { name: 'Özgür Ulus', position: 'Orta Saha' },
                { name: 'Emre Çevik', position: 'Forvet' },
                { name: 'Turan Aktaş', position: 'Forvet' }
            ];

            players = [];
            testPlayers.forEach(p => {
                players.push({
                    id: Date.now() + Math.random(),
                    name: p.name,
                    position: p.position
                });
            });

            updatePlayersList();
            updateStats();
            showMessage('14 test oyuncusu eklendi!', 'success');
        }

        // Oyuncu Ekle
        function addPlayer() {
            const name = document.getElementById('playerName').value.trim();
            const position = document.getElementById('playerPosition').value;

            if (!name || !position) {
                showMessage('Lütfen tüm alanları doldurunuz!', 'warning');
                return;
            }

            const player = {
                id: Date.now(),
                name: name,
                position: position
            };

            players.push(player);
            showMessage(`${name} başarıyla eklendi!`, 'success');

            document.getElementById('playerName').value = '';
            document.getElementById('playerPosition').value = '';

            updatePlayersList();
            updateStats();
        }

        // Oyuncu Listesini Güncelle
        function updatePlayersList() {
            const listContainer = document.getElementById('playersList');
            listContainer.innerHTML = '';

            if (players.length === 0) {
                listContainer.innerHTML = '<p style="color: #999; text-align: center;">Henüz oyuncu eklenmedi</p>';
                return;
            }

            players.forEach(player => {
                const playerEl = document.createElement('div');
                playerEl.className = 'player-item';
                playerEl.innerHTML = `
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-position">${player.position}</div>
                    </div>
                    <button class="btn-remove" onclick="removePlayer(${player.id})">Sil</button>
                `;
                listContainer.appendChild(playerEl);
            });
        }

        // Oyuncu Sil
        function removePlayer(id) {
            players = players.filter(p => p.id !== id);
            updatePlayersList();
            updateStats();
        }

        // Formasyonu Hesapla
        function calculateFormation(team) {
            const defense = team.filter(p => p.position === 'Defans').length;
            const midfield = team.filter(p => p.position === 'Orta Saha').length;
            const forward = team.filter(p => p.position === 'Forvet').length;
            return `${defense}-${midfield}-${forward}`;
        }

        // Oyuncuları Sahada Göster
        function displayPlayers(team, fieldId, teamNum) {
            const field = document.getElementById(fieldId);
            field.innerHTML = '';

            // Pozisyona göre grupla
            const goalkeeper = team.filter(p => p.position === 'Kaleci');
            const defenders = team.filter(p => p.position === 'Defans');
            const midfielders = team.filter(p => p.position === 'Orta Saha');
            const forwards = team.filter(p => p.position === 'Forvet');

            let playerNum = 1;

            // Kaleci
            if (goalkeeper.length > 0) {
                const row = document.createElement('div');
                row.className = 'formation-row';
                goalkeeper.forEach(p => {
                    row.appendChild(createPlayerElement(p, playerNum++, teamNum));
                });
                field.appendChild(row);
            }

            // Defans
            if (defenders.length > 0) {
                const row = document.createElement('div');
                row.className = 'formation-row';
                defenders.forEach(p => {
                    row.appendChild(createPlayerElement(p, playerNum++, teamNum));
                });
                field.appendChild(row);
            }

            // Orta Saha
            if (midfielders.length > 0) {
                const row = document.createElement('div');
                row.className = 'formation-row';
                midfielders.forEach(p => {
                    row.appendChild(createPlayerElement(p, playerNum++, teamNum));
                });
                field.appendChild(row);
            }

            // Forvet
            if (forwards.length > 0) {
                const row = document.createElement('div');
                row.className = 'formation-row';
                forwards.forEach(p => {
                    row.appendChild(createPlayerElement(p, playerNum++, teamNum));
                });
                field.appendChild(row);
            }
        }

        // Oyuncu Elemanı Oluştur
        function createPlayerElement(player, number, teamNum) {
            const div = document.createElement('div');
            div.className = 'player-token';

            div.innerHTML = `
                <div class="player-number">${number}</div>
                <div class="player-name-field">${player.name}</div>
            `;
            div.title = `${player.name} - ${player.position}`;

            return div;
        }

        // Takımları Oluştur
        function createTeams() {
            if (players.length < 14) {
                showMessage('En az 14 oyuncu gereklidir (7 + 7)!', 'warning');
                return;
            }

            team1 = [];
            team2 = [];

            // Rastgele oyuncu seçimi
            const shuffled = [...players].sort(() => Math.random() - 0.5);

            for (let i = 0; i < 7; i++) {
                team1.push(shuffled[i]);
                team2.push(shuffled[i + 7]);
            }

            displayPlayers(team1, 'team1-field', 1);
            displayPlayers(team2, 'team2-field', 2);

            // Formasyonları göster
            const formation1 = calculateFormation(team1);
            const formation2 = calculateFormation(team2);
            document.getElementById('team1-formation').textContent = formation1;
            document.getElementById('team2-formation').textContent = formation2;

            updateStats();
            showMessage('Takımlar oluşturuldu!', 'success');
        }

        // İstatistikleri Güncelle
        function updateStats() {
            document.getElementById('totalPlayers').textContent = players.length;
            document.getElementById('poolPlayers').textContent = players.length - team1.length - team2.length;
            document.getElementById('team1Count').textContent = team1.length;
            document.getElementById('team2Count').textContent = team2.length;
        }

        // Sıfırla
        function resetField() {
            if (confirm('Tüm verileri silmek istediğinize emin misiniz?')) {
                players = [];
                team1 = [];
                team2 = [];

                document.getElementById('playersList').innerHTML = '';
                document.getElementById('team1-field').innerHTML = '';
                document.getElementById('team2-field').innerHTML = '';
                document.getElementById('team1-formation').textContent = '-';
                document.getElementById('team2-formation').textContent = '-';

                updateStats();
                document.getElementById('message').innerHTML = '';
            }
        }

        // Mesaj Göster
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 3000);
        }

        // Başlangıç
        updatePlayersList();
        updateStats();
    </script>
</body>
</html>
